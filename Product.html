<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
    .btnLogout{
        background-color: rgb(201, 7, 7);
        border: none;
        margin-bottom: 15px;
        border-radius: 5px;
        width: 100px;
        height: 50px;
        color: #f8f9fa;
        font-weight: bold;
        margin-top: 20px;
        margin-left: 82%;
    }
</style>
<body>
        <a href="index.html"><button class="btnLogout">Logout</button></a>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <form>

                  <div class="mb-3">
                    <label for="Name" class="form-label">Product Name</label>
                    <input type="text" class="form-control" id="name">
                  </div>

                  <div class="mb-3">
                    <label for="price" class="form-label">Product Price</label>
                    <input type="number" class="form-control" id="price">
                  </div>

                  <div class="mb-3">
                    <label for="image" class="form-label">Product Image URL</label>
                    <input type="text" class="form-control" id="image">
                  </div>

                  <button id="btn_save" type="button" class="btn btn-primary">Save</button>

                </form>
            </div>

            <div class="col-md-8">
                <div class="table-responsive">
                    <table id="product_table" class="table table-bordered table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
</body>
<script>
    let btn_save = document.getElementById('btn_save');
    let name = document.getElementById('name');
    let price = document.getElementById('price');
    let image = document.getElementById('image');
    let product_table = document.querySelector('#product_table tbody');

    let products = JSON.parse(localStorage.getItem('products')) || [];
    let edit_id = null; // store id when editing

    render_product_table();

    btn_save.addEventListener('click', function () {
        let product_name = name.value;
        let product_price = price.value;
        let product_image = image.value;

        if (product_name === "" && product_price === "" && product_image === "") {
        alert("Please enter product name, product price, product image!");
        return;
        }
        if (product_price === "" && product_image === "") {
        alert("Please enter product price, product image!");
        return;
        }
        if (product_name === "" && product_image === "") {
        alert("Please enter product name, product image!");
        return;
        }
        if (product_name === "" && product_price === "") {
        alert("Please enter product name, product price!");
        return;
        }

        if (product_name === "") {
        alert("Please enter product name!");
        return;
        }
        if (product_price === "") {
        alert("Please enter product price!");
        return;
        }
        if (product_image === "") {
        alert("Please enter product image!");
        return;
        }

        if (edit_id === null) {
            // ➜ ADD NEW
            let product_id = Math.floor(Math.random() * 1000);
            products.push({
                id: product_id,
                name: product_name,
                price: product_price,
                image: product_image
            });
        } else {
            // ➜ UPDATE
            products = products.map(p => {
                if (p.id == edit_id) {
                    return {
                        id: edit_id,
                        name: product_name,
                        price: product_price,
                        image: product_image
                    };
                }
                return p;
            });
            edit_id = null;
            btn_save.innerText = "Save";
        }

        localStorage.setItem('products', JSON.stringify(products));

        // clear form
        name.value = "";
        price.value = "";
        image.value = "";

        render_product_table();
    });

    function render_product_table() {
        product_table.innerHTML = "";

        products.forEach(product => {
            let tr = document.createElement('tr');

            tr.innerHTML = ` <tr>
                <td>${product.id}</td>
                <td>
                    <img style = "height: 35px; object-fit: contain" src="${product.image}" width="100">
                </td>
                <td>${product.name}</td>
                <td>$${product.price}</td>
                <td>
                    <button onclick="editProduct(${product.id})" class="btn btn-sm btn-primary">Edit</button>
                    <button onclick="deleteProduct(${product.id})" class="btn btn-sm btn-danger">Delete</button>
                </td>
            </tr>`;

            product_table.appendChild(tr);
        });
    }

    //DELETE
    function deleteProduct(id) {
    if (!confirm("Are you sure you want to delete this product?")) return;

    products = products.filter(p => p.id !== id);
    localStorage.setItem('products', JSON.stringify(products));
    render_product_table();
}

    //EDIT
    function editProduct(id) {
        let product = products.find(p => p.id === id);

        name.value = product.name;
        price.value = product.price;
        image.value = product.image;

        edit_id = id;
        btn_save.innerText = "Update";
    }
</script>
</html>
