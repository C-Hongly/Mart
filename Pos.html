<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS - Mart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { padding: 20px; background: #f8f9fa; }
    .product-card { cursor: pointer; transition: transform 0.2s; }
    .product-card:hover { transform: scale(1.05); }
    .product-img { height: 80px; object-fit: contain; }
    .order-item img { height: 40px; object-fit: contain; margin-right: 10px; }
    .btnLogout{
        background-color: rgb(201, 7, 7);
        border: none;
        margin-bottom: 15px;
        border-radius: 5px;
        width: 100px;
        height: 50px;
        color: #f8f9fa;
        font-weight: bold;
    }
</style>
</head>
<body>
        <a href="index.html"><button class="btnLogout">Logout</button></a>
<div class="container-fluid">
    <div class="row">
        <!-- Products -->
        <div class="col-md-8">
            <div class="row" id="product_grid">
                <!-- Product cards will render here -->
            </div>
        </div>

        <!-- POS Order -->
        <div class="col-md-4">
            
            <h4>Order</h4>
            <div id="order_list" class="list-group mb-3"></div>
            <p>Subtotal: $<span id="subtotal">0.00</span></p>
            <p>Tax (10%): $<span id="tax">0.00</span></p>
            <h5>Total: $<span id="total">0.00</span></h5>
            <button class="btn btn-warning w-100" id="place_order">Place Order</button>
        </div>
    </div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [];

// Sample image if missing
const defaultImage = "https://via.placeholder.com/100x80.png?text=Sample";

let order = [];

function renderProducts() {
    const grid = document.getElementById('product_grid');
    grid.innerHTML = "";

    products.forEach(p => {
        let div = document.createElement('div');
        div.className = "col-md-3 mb-3";

        div.innerHTML = `
        <div class="card product-card p-2 text-center" onclick="addToOrder(${p.id})">
            <img src="${p.image || defaultImage}" class="product-img card-img-top" alt="${p.name}">
            <div class="card-body p-2">
                <h6 class="card-title">${p.name}</h6>
                <p class="card-text">$${p.price}</p>
            </div>
        </div>`;
        grid.appendChild(div);
    });
}

function addToOrder(id) {
    const product = products.find(p => p.id === id);
    const existing = order.find(o => o.id === id);
    if (existing) {
        existing.quantity += 1;
    } else {
        order.push({ ...product, quantity: 1 });
    }
    renderOrder();
}

function renderOrder() {
    const list = document.getElementById('order_list');
    list.innerHTML = "";

    let subtotal = 0;
    order.forEach(item => {
        subtotal += parseFloat(item.price) * item.quantity;
        let li = document.createElement('div');
        li.className = "list-group-item d-flex justify-content-between align-items-center order-item";
        li.innerHTML = `
            <div class="d-flex align-items-center">
                <img src="${item.image || defaultImage}" alt="${item.name}">
                <span>${item.name} x${item.quantity}</span>
            </div>
            <div>
                $${(item.price * item.quantity).toFixed(2)}
                <button class="btn btn-sm btn-danger ms-2" onclick="removeItem(${item.id})">x</button>
            </div>`;
        list.appendChild(li);
    });

    document.getElementById('subtotal').innerText = subtotal.toFixed(2);
    let tax = subtotal * 0.10;
    document.getElementById('tax').innerText = tax.toFixed(2);
    document.getElementById('total').innerText = (subtotal + tax).toFixed(2);
}

function removeItem(id) {
    order = order.filter(o => o.id !== id);
    renderOrder();
}

document.getElementById('place_order').addEventListener('click', () => {
    if(order.length === 0){
        alert("No items in order!");
        return;
    }
    alert("Order placed successfully!");
    order = [];
    renderOrder();
});

renderProducts();
</script>
</body>
</html>
